name: Bug report
description: Report reproducible Cuebook CLI behavior
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Include the command and sanitized output. Never include OAuth tokens.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CLI version
      placeholder: cuebook --version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Node 22
    validations:
      required: true
